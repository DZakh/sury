name: CI

on:
  push:
    branches:
      - main
      - "v\\d+.\\d+.\\d+-patch"
  pull_request:
  # Lets CodSpeed trigger backtest runs to seed initial baseline data.
  workflow_dispatch:

jobs:
  sury:
    name: Sury - Build & Test & Pack
    runs-on: ubuntu-24.04
    permissions:
      contents: read # required for actions/checkout
      pull-requests: write # required to post the bundle-size comment on PRs
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
      - uses: actions/setup-node@v3
        with:
          node-version: 24.16.0
          cache: "pnpm"
      - run: pnpm install

      - run: pnpm build
        working-directory: packages/sury

      - name: Type performance benchmarks
        run: pnpm bench:types
        working-directory: packages/sury

      # Bundle size & tree-shaking guard. Fails if any scenario's gzip size
      # drifts beyond ±1% of tests/bundle-size.snapshot.json. Runs after build
      # so it measures the freshly compiled Sury.res.mjs. --markdown writes the
      # report for the PR comment below (it's also added to the job summary).
      - name: Bundle size benchmarks
        run: pnpm bench:bundle -- --markdown=bundle-size.md
        working-directory: packages/sury

      # Post (and keep updated) the bundle-size report as a sticky PR comment.
      # Runs even when the guard above fails, so a regression is visible inline.
      # Best-effort: PRs from forks get a read-only token and can't comment.
      - name: Comment bundle size on PR
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: bundle-size
          path: packages/sury/bundle-size.md

      - run: pnpm coverage
        working-directory: packages/sury

      - uses: codecov/codecov-action@v3
        with:
          files: packages/sury/coverage/lcov.info

      # Doesn't work with rescript v12
      # - run: pnpm lint:stdlib
      #   working-directory: packages/sury

      - uses: actions/upload-artifact@v4
        with:
          name: sury
          path: packages/sury/artifacts

  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-24.04
    permissions:
      contents: read # required for actions/checkout
      id-token: write # required for OIDC authentication with CodSpeed
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
      - uses: actions/setup-node@v3
        with:
          node-version: 24.16.0
          cache: "pnpm"
      - run: pnpm install

      # Runs the Vitest runtime benchmarks under CodSpeed instrumentation
      # (deterministic instruction counts). Posts a per-benchmark delta comment
      # on PRs; regression gating is configured in the CodSpeed dashboard.
      # Auth is tokenless via OIDC (see the permissions block above).
      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: pnpm --filter=sury bench && pnpm --filter=e2e benchmark:comparison

  ppx-build-linux:
    name: ppx-build-linux
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: packages/sury-ppx/src
    strategy:
      matrix:
        ocaml-compiler:
          - 5.3.0
    steps:
      - uses: actions/checkout@v4

      - name: Use OCaml ${{ matrix.ocaml-compiler}}
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}

      - name: Install deps
        run: opam install . --deps-only --with-test

      - name: Build
        run: opam exec -- dune build --profile static

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ppx-build-linux
          path: packages/sury-ppx/src/_build/default/bin/bin.exe
          if-no-files-found: error

  ppx-build-linux-arm:
    name: ppx-build-linux-arm
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: packages/sury-ppx/src
    strategy:
      matrix:
        ocaml-compiler:
          - 5.3.0
    steps:
      - uses: actions/checkout@v4

      - name: Use OCaml ${{ matrix.ocaml-compiler}}
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}

      - name: Install deps
        run: opam install . --deps-only --with-test

      - name: Build
        run: opam exec -- dune build --profile static

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ppx-build-linux-arm
          path: packages/sury-ppx/src/_build/default/bin/bin.exe
          if-no-files-found: error

  ppx-build-macos:
    name: ppx-build-macos
    runs-on: macOS-latest
    defaults:
      run:
        working-directory: packages/sury-ppx/src
    strategy:
      matrix:
        ocaml-compiler:
          - 5.3.0
    steps:
      - uses: actions/checkout@v4

      - name: Use OCaml ${{ matrix.ocaml-compiler}}
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}

      - name: Install deps
        run: opam install . --deps-only --with-test

      - name: Build
        run: opam exec -- dune build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ppx-build-macos
          path: packages/sury-ppx/src/_build/default/bin/bin.exe
          if-no-files-found: error

  ppx-build-windows:
    name: ppx-build-windows
    runs-on: windows-2025
    defaults:
      run:
        working-directory: packages/sury-ppx/src
    strategy:
      matrix:
        ocaml-compiler:
          - 5.3.0
    steps:
      - uses: actions/checkout@v4

      - name: Use OCaml ${{ matrix.ocaml-compiler}}
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}

      - name: Install deps
        run: opam install . --deps-only --with-test

      - name: Build
        run: opam exec -- dune build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ppx-build-windows
          path: packages/sury-ppx/src/_build/default/bin/bin.exe
          if-no-files-found: error

  pack-sury-ppx:
    name: Pack sury-ppx
    needs: [ppx-build-linux, ppx-build-linux-arm, ppx-build-macos, ppx-build-windows]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
      - uses: actions/setup-node@v3
        with:
          node-version: 24.16.0
          cache: "pnpm"
      - run: pnpm install

      - name: Download ppx linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: ppx-build-linux
          path: binaries/linux

      - name: Download ppx linux-ARM artifacts
        uses: actions/download-artifact@v4
        with:
          name: ppx-build-linux-arm
          path: binaries/linux-arm

      - name: Download macOS artifacts
        uses: actions/download-artifact@master
        with:
          name: ppx-build-macos
          path: binaries/macos

      - name: Download windows artifacts
        uses: actions/download-artifact@master
        with:
          name: ppx-build-windows
          path: binaries/windows

      - name: Move ppx artifacts
        run: |
          mv binaries/linux/bin.exe packages/sury-ppx/ppx-linux.exe
          mv binaries/linux-arm/bin.exe packages/sury-ppx/ppx-linux-arm.exe
          mv binaries/macos/bin.exe packages/sury-ppx/ppx-osx.exe
          mv binaries/windows/bin.exe packages/sury-ppx/ppx-windows.exe

      - name: npm pack (sury-ppx)
        run: npm pack
        working-directory: packages/sury-ppx

      - name: "Upload artifact: sury-ppx npm package"
        uses: actions/upload-artifact@v4
        with:
          name: sury-ppx
          path: packages/sury-ppx/sury-ppx-*.tgz

  e2e:
    name: E2E Test
    needs: [ppx-build-linux]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
      - uses: actions/setup-node@v3
        with:
          node-version: 24.16.0
          cache: "pnpm"
      - run: pnpm install

      - name: Download ppx linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: ppx-build-linux
          path: binaries/linux

      - name: Move ppx artifacts
        run: |
          mv binaries/linux/bin.exe packages/sury-ppx/ppx-linux.exe

      - name: Install ppx
        run: pnpm ppx:install
        working-directory: packages/e2e

      - run: pnpm rescript && pnpm test
        working-directory: packages/e2e
