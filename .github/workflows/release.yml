name: Release

on:
  release:
    types: [published]

jobs:
  find-ci-run:
    name: Find CI run for release commit
    runs-on: ubuntu-24.04
    permissions:
      actions: read
    outputs:
      run-id: ${{ steps.find.outputs.run-id }}
    steps:
      - id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          RUN_ID=$(gh run list \
            --commit ${{ github.sha }} \
            --workflow CI \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "No successful CI run found for commit ${{ github.sha }}" >&2
            exit 1
          fi
          echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"

  publish-sury:
    name: Publish sury
    needs: [find-ci-run]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
      actions: read
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22.6.0
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest
      - uses: actions/download-artifact@v4
        with:
          name: sury
          path: artifacts
          run-id: ${{ needs.find-ci-run.outputs.run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npm publish --provenance --access public
        working-directory: artifacts

  publish-sury-ppx:
    name: Publish sury-ppx
    needs: [find-ci-run]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.6.0
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest

      - uses: actions/download-artifact@v4
        with:
          name: ppx-build-linux
          path: binaries/linux
          run-id: ${{ needs.find-ci-run.outputs.run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          name: ppx-build-linux-arm
          path: binaries/linux-arm
          run-id: ${{ needs.find-ci-run.outputs.run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          name: ppx-build-macos
          path: binaries/macos
          run-id: ${{ needs.find-ci-run.outputs.run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          name: ppx-build-macos-x64
          path: binaries/macos-x64
          run-id: ${{ needs.find-ci-run.outputs.run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          name: ppx-build-windows
          path: binaries/windows
          run-id: ${{ needs.find-ci-run.outputs.run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Move ppx artifacts
        run: |
          mv binaries/linux/bin.exe packages/sury-ppx/ppx-linux.exe
          mv binaries/linux-arm/bin.exe packages/sury-ppx/ppx-linux-arm.exe
          mv binaries/macos/bin.exe packages/sury-ppx/ppx-osx.exe
          mv binaries/macos-x64/bin.exe packages/sury-ppx/ppx-osx-x64.exe
          mv binaries/windows/bin.exe packages/sury-ppx/ppx-windows.exe

      - run: npm publish --provenance --access public
        working-directory: packages/sury-ppx
